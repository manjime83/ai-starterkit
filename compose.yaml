services:
  postgres:
    image: postgres:18-alpine
    container_name: ai-starterkit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_starterkit
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_starterkit"]
      interval: 10s
      timeout: 5s
      retries: 5

  s3:
    image: adobe/s3mock:latest
    container_name: ai-starterkit-s3
    restart: unless-stopped
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: ai-starterkit
      COM_ADOBE_TESTING_S3MOCK_STORE_RETAIN_FILES_ON_EXIT: "true"
      COM_ADOBE_TESTING_S3MOCK_STORE_ROOT: /data
    ports:
      - "9090:9090"
    volumes:
      - ./.data/s3:/data
